schema_version: "1"
id: datadog-roles-sync
version: v2.0.0
name: Datadog Roles Sync
description: >-
  Reads JustIAM app mappings (variable_name=roles) as the source of truth
  and keeps Datadog SAML role authn_mappings in sync. Managed roles (Datadog
  built-ins) are never created or deleted — only SAML authn_mappings are managed.
tags:
  - datadog
  - roles
  - saml
  - sync

schedule:
  type: cron
  default_cron: "0 * * * *"
  timeout_secs: 120
  overlap_policy: queue

config:
  - key: dd_endpoint
    label: "Datadog Endpoint"
    description: "Datadog API base URL (e.g. https://api.datadoghq.eu)"
    type: text
    required: true
  - key: justiam_app_id
    label: "Application"
    description: "JustIAM application whose app mappings to sync (roles variable)"
    type: application_id
    required: true
  - key: variable_name
    label: "Variable Name"
    description: "App mapping variable name containing role names"
    type: text
    default: "roles"
    required: true

secrets:
  - key: dd_api_key
    label: "DD API Key"
    description: "Datadog API key (DD-API-KEY header)"
    required: true
  - key: dd_app_key
    label: "DD Application Key"
    description: "Datadog application key (DD-APPLICATION-KEY header)"
    required: true

script: |
  package task

  import (
    "bytes"
    "encoding/json"
    "errors"
    "fmt"
    "io"
    "log"
    "net/http"
    "strings"

    "config"
    "idp"
    "secrets"
  )

  // ── Datadog roles types ────────────────────────────────────────────────────
  // GET /api/v2/roles → data[].attributes.{name, managed}
  // Roles are not created/deleted here — managed via Datadog Terraform provider.
  // This script only manages SAML authn_mappings that point to existing roles.
  // Pagination: page[number]+page[size], meta.page.total_count

  type ddRoleAttrs struct {
    Name    string `json:"name"`
    Managed bool   `json:"managed"`
  }

  type ddRole struct {
    ID         string      `json:"id"`
    Attributes ddRoleAttrs `json:"attributes"`
  }

  type ddRolePagination struct {
    Total int `json:"total_count"`
  }

  type ddRoleMeta struct {
    Page ddRolePagination `json:"page"`
  }

  type ddRolesPage struct {
    Data []ddRole   `json:"data"`
    Meta ddRoleMeta `json:"meta"`
  }

  // ── Datadog authn_mapping types (SAML → role assignments) ─────────────────
  // GET/POST /api/v2/authn_mappings, DELETE /api/v2/authn_mappings/{id}
  // resource_type=role filters to role mappings only.

  type ddRoleAuthNAttrs struct {
    AttributeKey   string `json:"attribute_key"`
    AttributeValue string `json:"attribute_value"`
  }

  type ddRoleAuthNRoleData struct {
    ID string `json:"id"`
  }

  type ddRoleAuthNRoleRel struct {
    Data ddRoleAuthNRoleData `json:"data"`
  }

  type ddRoleAuthNRels struct {
    Role ddRoleAuthNRoleRel `json:"role"`
  }

  type ddRoleAuthNMapping struct {
    ID            string           `json:"id"`
    Attributes    ddRoleAuthNAttrs `json:"attributes"`
    Relationships ddRoleAuthNRels  `json:"relationships"`
  }

  type ddRoleAuthNPageCounts struct {
    TotalFilteredCount int `json:"total_filtered_count"`
  }

  type ddRoleAuthNPageMeta struct {
    Page ddRoleAuthNPageCounts `json:"page"`
  }

  type ddRoleAuthNPage struct {
    Data []ddRoleAuthNMapping `json:"data"`
    Meta ddRoleAuthNPageMeta  `json:"meta"`
  }

  type ddRoleAuthNCreateResp struct {
    Data ddRoleAuthNMapping `json:"data"`
  }

  // ── Datadog HTTP helper ────────────────────────────────────────────────────

  func ddDo(method, url, apiKey, appKey string, body []byte) ([]byte, int, error) {
    var br io.Reader
    if len(body) > 0 {
      br = bytes.NewReader(body)
    }
    req, err := http.NewRequest(method, url, br)
    if err != nil {
      return nil, 0, err
    }
    req.Header.Set("DD-API-KEY", apiKey)
    req.Header.Set("DD-APPLICATION-KEY", appKey)
    req.Header.Set("Accept", "application/json")
    if len(body) > 0 {
      req.Header.Set("Content-Type", "application/json")
    }
    resp, err := http.DefaultClient.Do(req)
    if err != nil {
      return nil, 0, err
    }
    raw, _ := io.ReadAll(resp.Body)
    resp.Body.Close()
    return raw, resp.StatusCode, nil
  }

  // ── Datadog: fetch all roles (paginated) ───────────────────────────────────
  // Returns all roles (managed + custom) keyed by lowercase name.
  // Used only for ID lookup when creating authn_mappings.

  func fetchDDRoles(ddEndpoint, apiKey, appKey string) (map[string]ddRole, error) {
    all := make(map[string]ddRole)
    pageNum  := 0
    pageSize := 100
    for {
      reqURL := fmt.Sprintf("%s/api/v2/roles?page[number]=%d&page[size]=%d",
        ddEndpoint, pageNum, pageSize)
      raw, status, err := ddDo("GET", reqURL, apiKey, appKey, nil)
      if err != nil {
        return nil, fmt.Errorf("GET /api/v2/roles: %w", err)
      }
      if status >= 300 {
        return nil, fmt.Errorf("GET /api/v2/roles HTTP %d: %s", status, strings.TrimSpace(string(raw)))
      }
      var page ddRolesPage
      if err := json.Unmarshal(raw, &page); err != nil {
        return nil, fmt.Errorf("decode roles response: %w (body: %s)", err, string(raw))
      }
      log.Printf("  dd roles page %d: returned=%d total=%d", pageNum, len(page.Data), page.Meta.Page.Total)
      for _, r := range page.Data {
        if r.ID == "" || r.Attributes.Name == "" {
          continue
        }
        key := strings.ToLower(r.Attributes.Name)
        all[key] = r
        log.Printf("    dd role: name=%q managed=%v id=%s", r.Attributes.Name, r.Attributes.Managed, r.ID)
      }
      if len(page.Data) < pageSize {
        break
      }
      pageNum++
    }
    return all, nil
  }

  // ── Datadog: fetch all SAML role authn mappings ────────────────────────────
  // Returns mappings keyed by lowercase attribute_value, filtered to attrKey.

  func fetchDDAuthNRoleMappings(ddEndpoint, apiKey, appKey, attrKey string) (map[string]ddRoleAuthNMapping, error) {
    all := make(map[string]ddRoleAuthNMapping)
    reqURL := fmt.Sprintf("%s/api/v2/authn_mappings?resource_type=role&page[size]=500", ddEndpoint)
    raw, status, err := ddDo("GET", reqURL, apiKey, appKey, nil)
    if err != nil {
      return nil, fmt.Errorf("GET /api/v2/authn_mappings: %w", err)
    }
    if status >= 300 {
      return nil, fmt.Errorf("GET /api/v2/authn_mappings HTTP %d: %s", status, strings.TrimSpace(string(raw)))
    }
    var page ddRoleAuthNPage
    if err := json.Unmarshal(raw, &page); err != nil {
      return nil, fmt.Errorf("decode authn_mappings response: %w (body: %s)", err, string(raw))
    }
    log.Printf("  dd role authn_mappings: total_filtered=%d", page.Meta.Page.TotalFilteredCount)
    for _, m := range page.Data {
      if m.ID == "" || m.Attributes.AttributeValue == "" {
        continue
      }
      if m.Attributes.AttributeKey != attrKey {
        continue
      }
      key := strings.ToLower(m.Attributes.AttributeValue)
      all[key] = m
      log.Printf("    dd role authn_mapping: value=%q id=%s role_id=%s",
        m.Attributes.AttributeValue, m.ID, m.Relationships.Role.Data.ID)
    }
    return all, nil
  }

  // createDDAuthNRoleMapping creates a SAML → role authn mapping.
  func createDDAuthNRoleMapping(ddEndpoint, apiKey, appKey, attrKey, attrValue, roleID string) (string, error) {
    body, err := json.Marshal(map[string]interface{}{
      "data": map[string]interface{}{
        "type": "authn_mappings",
        "attributes": map[string]string{
          "attribute_key":   attrKey,
          "attribute_value": attrValue,
        },
        "relationships": map[string]interface{}{
          "role": map[string]interface{}{
            "data": map[string]string{
              "id":   roleID,
              "type": "roles",
            },
          },
        },
      },
    })
    if err != nil {
      return "", err
    }
    raw, status, err := ddDo("POST", ddEndpoint+"/api/v2/authn_mappings", apiKey, appKey, body)
    if err != nil {
      return "", err
    }
    log.Printf("    dd authn role create HTTP %d: %s", status, strings.TrimSpace(string(raw)))
    if status >= 300 {
      return "", fmt.Errorf("POST /api/v2/authn_mappings HTTP %d: %s", status, strings.TrimSpace(string(raw)))
    }
    var created ddRoleAuthNCreateResp
    if err := json.Unmarshal(raw, &created); err != nil {
      return "", fmt.Errorf("decode authn create response: %w (body: %s)", err, string(raw))
    }
    return created.Data.ID, nil
  }

  // deleteDDAuthNRoleMapping deletes a SAML role authn mapping (204 empty body).
  func deleteDDAuthNRoleMapping(ddEndpoint, apiKey, appKey, mappingID string) error {
    url := fmt.Sprintf("%s/api/v2/authn_mappings/%s", ddEndpoint, mappingID)
    raw, status, err := ddDo("DELETE", url, apiKey, appKey, nil)
    if err != nil {
      return err
    }
    if status >= 300 {
      return fmt.Errorf("DELETE /api/v2/authn_mappings/%s HTTP %d: %s", mappingID, status, strings.TrimSpace(string(raw)))
    }
    return nil
  }

  // ── Entry point ────────────────────────────────────────────────────────────

  func Run() (string, error) {
    ddEndpoint := strings.TrimRight(config.Get("dd_endpoint"), "/")
    appID      := config.Get("justiam_app_id")
    varName    := config.Get("variable_name")
    ddAPIKey   := secrets.Get("dd_api_key")
    ddAppKey   := secrets.Get("dd_app_key")

    var missing []string
    if ddEndpoint == "" { missing = append(missing, "config:dd_endpoint") }
    if appID == ""      { missing = append(missing, "config:justiam_app_id") }
    if varName == ""    { missing = append(missing, "config:variable_name") }
    if ddAPIKey == ""   { missing = append(missing, "secret:dd_api_key") }
    if ddAppKey == ""   { missing = append(missing, "secret:dd_app_key") }
    if len(missing) > 0 {
      return "", fmt.Errorf("missing required values: %s", strings.Join(missing, ", "))
    }

    log.Printf("config: dd_endpoint=%s justiam_app_id=%s variable_name=%s", ddEndpoint, appID, varName)

    // 1. Read JustIAM app mappings — source of truth.
    allMappings, err := idp.ListAppMappingsByApp(appID)
    if err != nil {
      return "", fmt.Errorf("list app mappings for app %s: %w", appID, err)
    }
    if len(allMappings) == 0 {
      return "", errors.New("no app mappings found for this application — check that justiam_app_id is correct")
    }

    varNames := make(map[string]bool)
    for _, m := range allMappings {
      varNames[m.VariableName] = true
    }
    log.Printf("justiam: app_id=%s has %d total mappings across variables: %v",
      appID, len(allMappings), varNames)

    type jiMapping struct {
      id    string
      value string
    }
    var jiMappings []jiMapping
    for _, m := range allMappings {
      if m.VariableName == varName {
        jiMappings = append(jiMappings, jiMapping{id: m.ID, value: m.Value})
      }
    }
    if len(jiMappings) == 0 {
      return "", fmt.Errorf("variable_name %q not found — available variable names: %v", varName, varNames)
    }
    log.Printf("justiam: variable_name=%q → %d mappings", varName, len(jiMappings))
    for _, m := range jiMappings {
      log.Printf("  mapping id=%s value=%q", m.id, m.value)
    }

    // desired set keyed by lowercase name.
    desired := make(map[string]bool, len(jiMappings))
    for _, m := range jiMappings {
      desired[strings.ToLower(m.value)] = true
    }

    // 2. Fetch all Datadog roles (for ID lookup only — not created/deleted here).
    log.Printf("fetching Datadog roles from %s ...", ddEndpoint)
    ddRoles, err := fetchDDRoles(ddEndpoint, ddAPIKey, ddAppKey)
    if err != nil {
      return "", fmt.Errorf("fetch DD roles: %w", err)
    }
    log.Printf("datadog: %d roles found", len(ddRoles))

    // 3. Fetch existing SAML role authn_mappings.
    samlAttrKey := "http://schemas.xmlsoap.org/claims/Role"
    log.Printf("fetching Datadog SAML role authn_mappings (attr_key=%s) ...", samlAttrKey)
    samlMappings, err := fetchDDAuthNRoleMappings(ddEndpoint, ddAPIKey, ddAppKey, samlAttrKey)
    if err != nil {
      return "", fmt.Errorf("fetch DD role authn_mappings: %w", err)
    }
    log.Printf("datadog: %d SAML role mappings found before sync", len(samlMappings))

    // 4. Create SAML mappings present in JustIAM but missing in Datadog.
    //    Skip if the role does not exist yet in Datadog (log a warning).
    var createdList []string
    var skippedList []string
    var warnList []string
    for _, m := range jiMappings {
      nameKey := strings.ToLower(m.value)
      role, roleExists := ddRoles[nameKey]
      if !roleExists {
        log.Printf("WARNING: no Datadog role found with name=%q — skipping SAML mapping", m.value)
        warnList = append(warnList, m.value)
        continue
      }
      if _, exists := samlMappings[nameKey]; exists {
        log.Printf("SAML role mapping %q already in sync — skipping", m.value)
        skippedList = append(skippedList, m.value)
        continue
      }
      log.Printf("creating SAML role mapping: value=%q → role id=%s", m.value, role.ID)
      newID, err := createDDAuthNRoleMapping(ddEndpoint, ddAPIKey, ddAppKey, samlAttrKey, m.value, role.ID)
      if err != nil {
        return "", fmt.Errorf("create SAML role mapping for %q: %w", m.value, err)
      }
      log.Printf("  → created id=%s", newID)
      createdList = append(createdList, m.value)
    }

    // 5. Delete SAML role mappings no longer in JustIAM.
    var deletedList []string
    for attrVal, sm := range samlMappings {
      if !desired[attrVal] {
        log.Printf("deleting stale SAML role mapping: value=%q id=%s", attrVal, sm.ID)
        if err := deleteDDAuthNRoleMapping(ddEndpoint, ddAPIKey, ddAppKey, sm.ID); err != nil {
          return "", fmt.Errorf("delete SAML role mapping %q (id=%s): %w", attrVal, sm.ID, err)
        }
        log.Printf("  → deleted")
        deletedList = append(deletedList, attrVal)
      }
    }

    return fmt.Sprintf(
      "sync complete: justiam_mappings=%d dd_roles=%d saml[before=%d created=%d %v skipped=%d deleted=%d %v warn=%d %v]",
      len(jiMappings), len(ddRoles),
      len(samlMappings), len(createdList), createdList, len(skippedList),
      len(deletedList), deletedList, len(warnList), warnList,
    ), nil
  }

